<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Employees | Arovia ERP</title>

<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/employee.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="container">

    <header>

        <div>

            <h1>Employees</h1>

            <p>Manage all company employees</p>

        </div>

        <button class="add-btn">

            <i class="fa-solid fa-plus"></i>

            Add Employee

        </button>

    </header>

    <div class="toolbar">

        <input
        type="text"
        placeholder="Search employee...">

    </div>

    <table>

        <thead>

            <tr>

                <th>ID</th>
                <th>Name</th>
                <th>Designation</th>
                <th>Territory</th>
                <th>Phone</th>
                <th>Status</th>
                <th>Action</th>

            </tr>

        </thead>

        <tbody>

            <tr>

                <td>EMP001</td>
                <td>Rahul Kumar</td>
                <td>Medical Representative</td>
                <td>Chennai</td>
                <td>9876543210</td>

                <td>

                    <span class="active">
                        Active
                    </span>

                </td>

                <td>

                    <button class="edit">
                        <i class="fa-solid fa-pen"></i>
                    </button>

                    <button class="delete">
                        <i class="fa-solid fa-trash"></i>
                    </button>

                </td>

            </tr>

            <tr>

                <td>EMP002</td>
                <td>Priya Sharma</td>
                <td>Area Manager</td>
                <td>Coimbatore</td>
                <td>9123456780</td>

                <td>

                    <span class="active">
                        Active
                    </span>

                </td>

                <td>

                    <button class="edit">
                        <i class="fa-solid fa-pen"></i>
                    </button>

                    <button class="delete">
                        <i class="fa-solid fa-trash"></i>
                    </button>

                </td>

            </tr>

        </tbody>

    </table>

</div>

<script src="../js/employee.js"></script>

</body>

</html>
